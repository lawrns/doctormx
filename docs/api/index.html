<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor.mx API Documentation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        .header {
            background: linear-gradient(135deg, #0ea5e9 0%, #3b82f6 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .api-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            padding: 1.5rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #0ea5e9;
        }
        
        .stat-label {
            color: #64748b;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .swagger-ui {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .topbar {
            display: none;
        }
        
        .scheme-container {
            background: #f8fafc !important;
            padding: 2rem !important;
        }
        
        .info {
            max-width: 1200px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏥 Doctor.mx API</h1>
        <p>Documentación completa de la API de telemedicina</p>
    </div>
    
    <div class="api-stats">
        <div class="stat">
            <div class="stat-value">132</div>
            <div class="stat-label">Endpoints</div>
        </div>
        <div class="stat">
            <div class="stat-value">144</div>
            <div class="stat-label">Métodos HTTP</div>
        </div>
        <div class="stat">
            <div class="stat-value">29</div>
            <div class="stat-label">Categorías</div>
        </div>
        <div class="stat">
            <div class="stat-value">3.0.3</div>
            <div class="stat-label">OpenAPI</div>
        </div>
    </div>
    
    <div id="swagger-ui"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
        window.onload = function() {
            SwaggerUIBundle({
                url: '../../openapi.yaml',
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIBundle.presets.standalone
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "BaseLayout",
                supportedSubmitMethods: ['get', 'post', 'put', 'delete', 'patch'],
                validatorUrl: null,
                tryItOutEnabled: true,
                displayRequestDuration: true,
                docExpansion: 'list',
                filter: true,
                showExtensions: true,
                showCommonExtensions: true,
                requestSnippetsEnabled: true,
                defaultModelRendering: 'model',
                displayOperationId: false
            });
        };
    </script>
</body>
</html>
