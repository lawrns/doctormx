<!DOCTYPE html>
<html>
<head>
  <title>DoctorMX Login Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
    }
    button {
      padding: 10px 15px;
      background-color: #4299e1;
      color: white;
      border: none;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ddd;
      display: none;
    }
  </style>
</head>
<body>
  <h1>DoctorMX Login Test</h1>
  <p>Test your Supabase authentication directly:</p>
  
  <div class="form-group">
    <label for="email">Email:</label>
    <input type="email" id="email" value="testing@test.com">
  </div>
  
  <div class="form-group">
    <label for="password">Password:</label>
    <input type="password" id="password" value="testtest">
  </div>
  
  <button id="loginBtn">Login</button>
  <button id="testLogin">Test Hard-Coded Credentials</button>
  
  <div id="result"></div>
  
  <script src="https://unpkg.com/@supabase/supabase-js@2.38.4"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const supabaseUrl = 'https://oxlbametpfubwnrmrbsv.supabase.co';
      const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94bGJhbWV0cGZ1Ynducm1yYnN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA2MjAxNjQsImV4cCI6MjA1NjE5NjE2NH0.H2_4ueekh5HVvdXBw7OX_EKWEO26kehXBRfd5HJvjgA';
      
      const supabase = supabase.createClient(supabaseUrl, supabaseKey);
      
      const resultDiv = document.getElementById('result');
      
      document.getElementById('loginBtn').addEventListener('click', async function() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        resultDiv.style.display = 'block';
        resultDiv.textContent = 'Logging in...';
        
        try {
          const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password
          });
          
          if (error) {
            throw error;
          }
          
          resultDiv.textContent = 'Login successful: ' + JSON.stringify(data, null, 2);
        } catch (error) {
          resultDiv.textContent = 'Login error: ' + error.message;
        }
      });
      
      document.getElementById('testLogin').addEventListener('click', async function() {
        const email = 'testing@test.com';
        const password = 'testtest';
        
        resultDiv.style.display = 'block';
        resultDiv.textContent = 'Testing login with hardcoded credentials...';
        
        try {
          // Mock login handling like in AuthContext.tsx
          if (email === 'testing@test.com' && password === 'testtest') {
            resultDiv.textContent = 'Test login successful with mock credentials!';
          } else {
            resultDiv.textContent = 'Test credentials did not match';
          }
        } catch (error) {
          resultDiv.textContent = 'Test login error: ' + error.message;
        }
      });
    });
  </script>
</body>
</html>
