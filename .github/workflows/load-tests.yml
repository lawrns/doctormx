name: Load Tests

on:
  schedule:
    # Run load tests daily at 2 AM UTC (8 PM Mexico time)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - concurrent
          - api
          - booking
          - video
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  K6_VERSION: '0.50.0'

jobs:
  setup:
    name: Setup and Validate
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
      base-url: ${{ steps.url.outputs.base-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine if tests should run
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "should-run=false" >> $GITHUB_OUTPUT
          else
            echo "should-run=true" >> $GITHUB_OUTPUT
          fi

      - name: Set Base URL
        id: url
        run: |
          ENV="${{ inputs.environment || 'staging' }}"
          if [[ "$ENV" == "production" ]]; then
            echo "base-url=https://doctormx.com" >> $GITHUB_OUTPUT
          else
            echo "base-url=https://staging.doctormx.com" >> $GITHUB_OUTPUT
          fi

  concurrent-users-test:
    name: Concurrent Users Test (1000 users)
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should-run == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install K6
        run: |
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Concurrent Users Test
        run: k6 run --out json=concurrent-results.json tests/load/concurrent-users.js
        env:
          BASE_URL: ${{ needs.setup.outputs.base-url }}
        continue-on-error: true

  api-load-test:
    name: API Load Test
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should-run == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install K6
        run: |
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run API Load Test
        run: k6 run --out json=api-results.json tests/load/api-load.js
        env:
          BASE_URL: ${{ needs.setup.outputs.base-url }}
        continue-on-error: true

  booking-surge-test:
    name: Booking Surge Test
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should-run == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install K6
        run: |
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Booking Surge Test
        run: k6 run --out json=booking-results.json tests/load/booking-surge.js
        env:
          BASE_URL: ${{ needs.setup.outputs.base-url }}
        continue-on-error: true

  video-consultation-test:
    name: Video Consultation Test
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should-run == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install K6
        run: |
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Video Consultation Test
        run: k6 run --out json=video-results.json tests/load/video-consultation.js
        env:
          BASE_URL: ${{ needs.setup.outputs.base-url }}
        continue-on-error: true
