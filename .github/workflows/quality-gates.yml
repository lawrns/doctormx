name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Strict Check
        run: |
          echo "🔍 Running TypeScript strict check..."
          npm run type-check

      - name: ESLint Check
        run: |
          echo "🔍 Running ESLint..."
          npm run lint

      - name: Run Tests with Coverage
        run: |
          echo "🔍 Running tests..."
          npm run test:coverage -- --reporter=json --outputFile=coverage-report.json

      - name: Check Coverage Threshold
        run: |
          echo "🔍 Checking coverage threshold..."
          if [ -f coverage-report.json ]; then
            COVERAGE=$(cat coverage-report.json | grep -o '"lines":{"total":[0-9]*,"covered":[0-9]*,"skipped":[0-9]*,"pct":[0-9.]*' | grep -o '"pct":[0-9.]*' | cut -d: -f2)
            echo "Current coverage: $COVERAGE%"
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "❌ Coverage $COVERAGE% is below 80% threshold"
              exit 1
            fi
            echo "✅ Coverage $COVERAGE% meets threshold"
          fi

      - name: Security Audit
        run: |
          echo "🔍 Running security audit..."
          npm audit --audit-level=moderate || true

      - name: Build Check
        run: |
          echo "🔍 Running build..."
          npm run build

      - name: Generate Quality Report
        run: |
          echo "📊 Generating quality report..."
          node scripts/quality/generate-report.js || echo "Report generation skipped"

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '✅ All quality gates passed!';
            if (fs.existsSync('quality-report.md')) {
              report = fs.readFileSync('quality-report.md', 'utf8');
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
