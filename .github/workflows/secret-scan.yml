name: Secret Scanning

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          chmod +x gitleaks
          ./gitleaks --version

      - name: Run Gitleaks Scan
        run: |
          ./gitleaks detect --verbose \
            --source . \
            --report-path gitleaks-report.sarif \
            --report-format sarif \
            --exit-code 1
        continue-on-error: false

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks

      - name: Upload Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: |
            gitleaks-report.sarif
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          if [ -f gitleaks-report.sarif ]; then
            echo "## Secret Scan Results :shield:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Scan completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "- Report uploaded to GitHub Security tab" >> $GITHUB_STEP_SUMMARY
            echo "- SARIF file available in artifacts" >> $GITHUB_STEP_SUMMARY
          fi
