      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        document_id:
          $ref: '#/components/schemas/UUID'
        document_type:
          type: string
        user_id:
          $ref: '#/components/schemas/UUID'
        user_name:
          type: string
        signed_at:
          $ref: '#/components/schemas/Timestamp'
        document_hash:
          type: string
        signature_value:
          type: string
        algorithm:
          type: string
        valid_until:
          $ref: '#/components/schemas/Timestamp'
          nullable: true

    # ==================== PHARMACY ====================
    PharmacySearchResult:
      type: object
      properties:
        query:
          type: string
        results:
          type: array
          items:
            type: object
            properties:
              pharmacyId:
                type: string
              productName:
                type: string
              price:
                type: number
              url:
                type: string
        total:
          type: integer
        searchTimeMs:
          type: integer
        pharmacies:
          type: array
          items:
            type: string
        cached:
          type: boolean
        cachedAt:
          type: string

    PriceComparisonResult:
      type: object
      properties:
        medicationName:
          type: string
        prices:
          type: array
          items:
            type: object
            properties:
              pharmacy:
                type: string
              price:
                type: number
              url:
                type: string
              inStock:
                type: boolean
        bestPrice:
          type: object
          properties:
            pharmacy:
              type: string
            price:
              type: number
        savings:
          type: number

    # ==================== TRIAGE ====================
    TriageAction:
      type: string
      enum: [EMERGENCY_CALL_911, URGENT_TELEMEDICINE, SCHEDULE_APPOINTMENT, SELF_CARE, NONE]

    TriageResult:
      type: object
      properties:
        action:
          $ref: '#/components/schemas/TriageAction'
          nullable: true
        urgency:
          type: string
          enum: [emergency, urgent, moderate, routine, self-care]
        reasons:
          type: array
          items:
            type: string
        ruleIds:
          type: array
          items:
            type: string
        careLevelInfo:
          type: object
          nullable: true
        mentalHealthCrisis:
          type: boolean

    # ==================== ERROR RESPONSES ====================
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          nullable: true

  responses:
    BadRequest:
      description: Solicitud inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Bad Request"
            message: "Datos de entrada inválidos"
            details:
              field: "email"
              message: "Email inválido"

    Unauthorized:
      description: No autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Unauthorized"
            message: "Se requiere autenticación"

    Forbidden:
      description: Acceso denegado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Forbidden"
            message: "No tiene permisos para esta acción"

    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Not Found"
            message: "El recurso solicitado no existe"

    RateLimit:
      description: Límite de solicitudes excedido
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Too Many Requests"
            message: "Ha excedido el límite de solicitudes"

    InternalError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Internal Server Error"
            message: "Ocurrió un error interno"
