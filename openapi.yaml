          schema:
            type: string
      responses:
        '200':
          description: Lista de seguimientos
          content:
            application/json:
              schema:
                type: object
                properties:
                  followUps:
                    type: array
                    items:
                      $ref: '#/components/schemas/FollowUp'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Programar seguimiento
      description: Programa un nuevo seguimiento
      tags:
        - Followups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - appointmentId
                - type
              properties:
                appointmentId:
                  type: string
                  format: uuid
                type:
                  type: string
                  enum: [follow_up_24h, follow_up_7d, medication_reminder, prescription_refill, chronic_care_check]
                scheduledAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Seguimiento programado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
