          application/json:
            schema:
              $ref: '#/components/schemas/CreateSignatureInput'
      responses:
        '200':
          description: Firma creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignatureResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/signature/verify:
    post:
      summary: Verificar firma
      description: Verifica la validez de una firma digital
      tags:
        - Digital Signature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signatureId
                - documentContent
