            type: string
            enum: [ACCESS, RECTIFY, CANCEL, OPPOSE]
        - name: status
          in: query
          description: Filtrar por estado
          schema:
            type: string
            enum: [pending, acknowledged, processing, completed, denied, cancelled]
        - name: page
          in: query
          description: Página (solo admin)
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Items por página (solo admin)
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: Ordenamiento
          schema:
            type: string
            enum: [created_at, due_date, status, priority, request_type]
            default: created_at
      responses:
        '200':
          description: Lista de solicitudes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      requests:
                        type: array
