                signatureId:
                  type: string
                  format: uuid
                documentContent:
                  type: string
      responses:
        '200':
          description: Verificación completada
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  details:
                    type: object

  /api/signature/{id}:
    get:
