openapi: 3.0.3
info:
  title: Doctor.mx API
  description: |
    Doctor.mx - Plataforma integral de telemedicina para México.
    
    Esta API proporciona acceso a todas las funcionalidades de la plataforma Doctor.mx,
    incluyendo consultas médicas virtuales, gestión de citas, recetas digitales,
    análisis de IA, consentimientos digitales, y más.
    
    ## Autenticación
    La API utiliza Supabase Auth para la autenticación. Incluye el token de sesión
    en el header `Authorization: Bearer <token>`.
    
    ## Roles
    - **patient**: Pacientes que buscan atención médica
    - **doctor**: Médicos que brindan consultas
    - **admin**: Administradores del sistema
    
    ## Rate Limiting
    Las solicitudes están limitadas por IP y usuario autenticado.
    Headers de respuesta:
    - `X-RateLimit-Limit`: Límite de solicitudes
    - `X-RateLimit-Remaining`: Solicitudes restantes
    - `X-RateLimit-Reset`: Tiempo de reinicio
  version: 1.0.0
  contact:
    name: Doctor.mx Support
    email: soporte@doctor.mx
  license:
    name: Propietario
    url: https://doctor.mx/terms

servers:
  - url: https://doctor.mx
    description: Producción
  - url: https://staging.doctor.mx
    description: Staging
  - url: http://localhost:3000
    description: Desarrollo local

security:
  - bearerAuth: []
  - cookieAuth: []

tags:
  - name: Health
    description: Health check y monitoreo
  - name: Authentication
    description: Autenticación y gestión de sesiones
  - name: Doctores
    description: Gestión de médicos y directorio
  - name: Appointments
    description: Citas médicas y agendamiento
  - name: Patients
    description: Gestión de pacientes y perfiles
  - name: AI
    description: Servicios de inteligencia artificial
  - name: Consultation
    description: Consultas médicas virtuales
  - name: Prescriptions
    description: Recetas médicas digitales
  - name: Chat
    description: Mensajería entre pacientes y doctores
  - name: Payments
    description: Pagos y facturación
  - name: Subscriptions
    description: Suscripciones y planes
  - name: Premium
    description: Funcionalidades premium
  - name: ARCO
    description: Derechos ARCO (Acceso, Rectificación, Cancelación, Oposición)
  - name: Consent
    description: Gestión de consentimientos
  - name: Analytics
    description: Análisis y métricas
  - name: Admin
    description: Funciones administrativas
  - name: Pharmacy
    description: Integración con farmacias
  - name: Reviews
    description: Reseñas y calificaciones
  - name: Second Opinion
    description: Segundas opiniones médicas
  - name: Referrals
    description: Referencias médicas entre doctores
  - name: Followups
    description: Seguimientos post-consulta
  - name: SOAP Notes
    description: Notas médicas en formato SOAP
  - name: Digital Signature
    description: Firmas digitales de documentos
  - name: Questionnaire
    description: Cuestionarios médicos adaptativos
  - name: Triage
    description: Evaluación de urgencia
  - name: Upload
    description: Subida de archivos
  - name: Cache
    description: Gestión de caché
  - name: Webhooks
    description: Webhooks para integraciones externas
  - name: Notifications
    description: Notificaciones por email
  - name: Anonymous
    description: Endpoints para usuarios no autenticados

paths:
  # ==================== HEALTH ====================
  /api/health:
    get:
      summary: Health check
      description: Verifica el estado de todos los servicios críticos y dependencias
      tags:
        - Health
      security: []
      responses:
        '200':
          description: Sistema saludable o degradado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Sistema no saludable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
    options:
      summary: CORS preflight
      description: Maneja solicitudes preflight CORS
      tags:
        - Health
      security: []
      responses:
        '204':
          description: No Content

  # ==================== DOCTORES ====================
  /api/doctores:
    get:
      summary: Listar doctores
      description: Obtiene listado paginado de doctores aprobados con filtros
      tags:
        - Doctores
      security: []
      parameters:
        - name: cursor
          in: query
          description: Cursor de paginación
          schema:
            type: string
        - name: limit
          in: query
          description: Número de resultados (máx 100)
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: direction
          in: query
          description: Dirección de paginación
          schema:
            type: string
            enum: [forward, backward]
            default: forward
        - name: specialty
          in: query
          description: Filtrar por especialidad (slug)
          schema:
            type: string
        - name: city
          in: query
          description: Filtrar por ciudad
          schema:
            type: string
        - name: search
          in: query
          description: Buscar por nombre de doctor
          schema:
            type: string
        - name: sort
          in: query
          description: Ordenar resultados
          schema:
            type: string
            enum: [rating, price, experience, created]
            default: rating
      responses:
        '200':
          description: Lista de doctores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDoctorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/doctores/{id}:
    get:
      summary: Obtener doctor por ID
      description: Obtiene información detallada de un doctor específico
      tags:
        - Doctores
      security: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del doctor
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Información del doctor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/doctores/{id}/available-dates:
    get:
      summary: Fechas disponibles
      description: Obtiene las fechas disponibles para agendar con un doctor
      tags:
        - Doctores
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Fechas disponibles
          content:
            application/json:
              schema:
                type: object
                properties:
                  dates:
                    type: array
                    items:
                      type: string
                      format: date
        '404':
          $ref: '#/components/responses/NotFound'

  /api/doctores/{id}/slots:
    get:
      summary: Horarios disponibles
      description: Obtiene los horarios disponibles para una fecha específica
      tags:
        - Doctores
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          required: true
          description: Fecha en formato YYYY-MM-DD
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Horarios disponibles
          content:
            application/json:
              schema:
                type: object
                properties:
                  slots:
                    type: array
                    items:
                      type: string
                      pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/doctor/availability:
    post:
      summary: Configurar disponibilidad
      description: Doctor configura su horario de disponibilidad
      tags:
        - Doctores
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                enabled_0:
                  type: string
                  description: Domingo habilitado ("on" o ausente)
                start_0:
                  type: string
                  pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
                end_0:
                  type: string
                  pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
                enabled_1:
                  type: string
                start_1:
                  type: string
                end_1:
                  type: string
                enabled_2:
                  type: string
                start_2:
                  type: string
                end_2:
                  type: string
                enabled_3:
                  type: string
                start_3:
                  type: string
                end_3:
                  type: string
                enabled_4:
                  type: string
                start_4:
                  type: string
                end_4:
                  type: string
                enabled_5:
                  type: string
                start_5:
                  type: string
                end_5:
                  type: string
                enabled_6:
                  type: string
                start_6:
                  type: string
                end_6:
                  type: string
      responses:
        '302':
          description: Redirección exitosa
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/doctor/onboarding:
    post:
      summary: Onboarding de doctor
      description: Completa el proceso de registro de un nuevo doctor
      tags:
        - Doctores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorOnboardingInput'
      responses:
        '200':
          description: Onboarding completado
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/doctor/verify-cedula:
    post:
      summary: Verificar cédula profesional
      description: Verifica la cédula profesional de un médico
      tags:
        - Doctores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cedulaNumber:
                  type: string
                specialty:
                  type: string
      responses:
        '200':
          description: Verificación exitosa
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                  professionalData:
                    type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/doctor/badges:
    get:
      summary: Obtener insignias
      description: Obtiene las insignias del doctor
      tags:
        - Doctores
      responses:
        '200':
          description: Lista de insignias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DoctorBadge'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/doctor/analytics/ai-referrals:
    get:
      summary: Analytics de referencias IA
      description: Obtiene estadísticas de referencias generadas por IA
      tags:
        - Doctores
        - Analytics
      responses:
        '200':
          description: Estadísticas de referencias
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIReferralAnalytics'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/directory/profiles/{id}:
    get:
      summary: Perfil público
      description: Obtiene el perfil público de un doctor para el directorio
      tags:
        - Doctores
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Perfil público
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicDoctorProfile'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/directory/recommended:
    get:
      summary: Doctores recomendados
      description: Obtiene doctores recomendados basados en IA
      tags:
        - Doctores
      security: []
      parameters:
        - name: symptoms
          in: query
          description: Síntomas para matching
          schema:
            type: string
        - name: specialty
          in: query
          description: Especialidad preferida
          schema:
            type: string
        - name: location
          in: query
          description: Ubicación del paciente
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
            maximum: 20
      responses:
        '200':
          description: Doctores recomendados
          content:
            application/json:
              schema:
                type: object
                properties:
                  doctors:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecommendedDoctor'
                  matchedBy:
                    type: string
                    enum: [symptoms, specialty, location, rating]

  /api/directory/claim:
    post:
      summary: Reclamar perfil
      description: Doctor reclama su perfil en el directorio
      tags:
        - Doctores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cedulaNumber:
                  type: string
                fullName:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '201':
          description: Solicitud de reclamo creada
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/directory/claim/{id}/verify:
    post:
      summary: Verificar reclamo
      description: Verifica el código de reclamo de perfil
      tags:
        - Doctores
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                verificationCode:
                  type: string
      responses:
        '200':
          description: Verificación exitosa
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'


  # ==================== APPOINTMENTS ====================
  /api/appointments:
    get:
      summary: Listar citas
      description: Obtiene las citas del usuario autenticado
      tags:
        - Appointments
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: direction
          in: query
          schema:
            type: string
            enum: [forward, backward]
            default: forward
        - name: status
          in: query
          description: Filtrar por estado
          schema:
            type: string
            enum: [all, upcoming, past, pending_payment, confirmed, completed, cancelled, refunded]
      responses:
        '200':
          description: Lista de citas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Crear cita
      description: Agenda una nueva cita médica
      tags:
        - Appointments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - doctorId
                - date
                - time
              properties:
                doctorId:
                  type: string
                  format: uuid
                date:
                  type: string
                  format: date
                time:
                  type: string
                  pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
      responses:
        '200':
          description: Cita creada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  appointmentId:
                    type: string
                    format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/appointments/{id}/cancel:
    post:
      summary: Cancelar cita
      description: Cancela una cita existente
      tags:
        - Appointments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Cita cancelada
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/appointments/{id}/video:
    get:
      summary: Token de video
      description: Obtiene token para sala de video de la cita
      tags:
        - Appointments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Token de video
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  roomUrl:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==================== PATIENTS ====================
  /api/patients:
    get:
      summary: Listar pacientes
      description: Obtiene lista de pacientes (solo doctores)
      tags:
        - Patients
      responses:
        '200':
          description: Lista de pacientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Patient'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/patient/profile:
    get:
      summary: Perfil del paciente
      description: Obtiene el perfil del paciente autenticado
      tags:
        - Patients
      responses:
        '200':
          description: Perfil del paciente
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: '#/components/schemas/PatientProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Actualizar perfil
      description: Actualiza el perfil del paciente autenticado
      tags:
        - Patients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileData'
      responses:
        '200':
          description: Perfil actualizado
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/patient/appointments:
    get:
      summary: Citas del paciente
      description: Obtiene las citas del paciente autenticado
      tags:
        - Patients
      responses:
        '200':
          description: Lista de citas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/patient/medical-history:
    get:
      summary: Historial médico
      description: Obtiene el historial médico del paciente
      tags:
        - Patients
      responses:
        '200':
          description: Historial médico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== AI SERVICES ====================
  /api/ai/consult:
    post:
      summary: Consulta con IA
      description: Inicia o continúa una consulta médica con IA
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - messages
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [user, assistant, system]
                      content:
                        type: string
                patientId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Respuesta de la IA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIConsultResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimit'

  /api/ai/transcription:
    post:
      summary: Transcribir audio
      description: Transcribe audio de consulta usando Whisper
      tags:
        - AI
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - appointmentId
                - audio
              properties:
                appointmentId:
                  type: string
                  format: uuid
                audio:
                  type: string
                  format: binary
      responses:
        '200':
          description: Transcripción completada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/ai/vision/analyze:
    post:
      summary: Analizar imagen médica
      description: Analiza imágenes médicas usando IA
      tags:
        - AI
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - imageType
              properties:
                file:
                  type: string
                  format: binary
                  description: Imagen (máx 5MB, jpg/png/webp)
                imageType:
                  type: string
                  enum: [skin, xray, lab_result, wound, eye, other]
                patientNotes:
                  type: string
      responses:
        '200':
          description: Análisis completado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisionAnalysisResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/ai/vision/result/{id}:
    get:
      summary: Resultado de análisis
      description: Obtiene el resultado de un análisis de imagen
      tags:
        - AI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resultado del análisis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisionAnalysisResult'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/ai/preconsulta:
    post:
      summary: Pre-consulta IA
      description: Inicia una pre-consulta con IA para triage inicial
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                symptoms:
                  type: string
                patientInfo:
                  type: object
      responses:
        '200':
          description: Pre-consulta iniciada
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommendations:
                    type: array
                    items:
                      $ref: '#/components/schemas/PreConsultaDoctor'
                  triage:
                    type: object
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/ai/followup:
    post:
      summary: Generar seguimiento
      description: Genera mensajes de seguimiento post-consulta
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                consultationId:
                  type: string
                  format: uuid
                followUpType:
                  type: string
                  enum: [24h, 7d, 30d]
      responses:
        '200':
          description: Seguimiento generado
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/ai/referrals/from-consultation:
    post:
      summary: Referencia desde consulta
      description: Genera referencia médica desde una consulta
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                consultationId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Referencia generada
        '401':
          $ref: '#/components/responses/Unauthorized'

