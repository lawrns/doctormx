          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalles de firma
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitalSignature'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/signature/consent:
