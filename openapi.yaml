          type: integer
        image_analysis_quota:
          type: integer

    # ==================== ARCO ====================
    ArcoRequestType:
      type: string
      enum: [ACCESS, RECTIFY, CANCEL, OPPOSE]

    ArcoRequestStatus:
      type: string
      enum: [pending, acknowledged, processing, info_required, escalated, completed, denied, cancelled]

    ArcoRequest:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        user_id:
          $ref: '#/components/schemas/UUID'
        request_type:
          $ref: '#/components/schemas/ArcoRequestType'
        title:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/ArcoRequestStatus'
        data_scope:
          type: array
          items:
            type: string
            enum: [profiles, appointments, prescriptions, soap_consultations, chat_conversations, chat_messages, payments, follow_up_schedules, all]
        specific_records:
          type: array
          items:
            type: string
        justification:
          type: string
          nullable: true
        submitted_via:
          type: string
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
        due_date:
          $ref: '#/components/schemas/Timestamp'
        resolved_at:
          $ref: '#/components/schemas/Timestamp'
          nullable: true

    ArcoRequestInput:
      type: object
      required:
        - request_type
        - title
        - description
        - data_scope
      properties:
        request_type:
          $ref: '#/components/schemas/ArcoRequestType'
        title:
          type: string
          minLength: 5
          maxLength: 200
        description:
          type: string
          minLength: 10
          maxLength: 2000
        data_scope:
          type: array
          items:
            type: string
            enum: [profiles, appointments, prescriptions, soap_consultations, chat_conversations, chat_messages, payments, follow_up_schedules, all]
        specific_records:
          type: array
          items:
            type: string
        justification:
          type: string
          maxLength: 1000

