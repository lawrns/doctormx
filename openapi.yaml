          type: string
          enum: [scheduled, sent, completed, cancelled]
        sent_at:
          $ref: '#/components/schemas/Timestamp'
          nullable: true
        completed_at:
          $ref: '#/components/schemas/Timestamp'
          nullable: true

    # ==================== DIGITAL SIGNATURE ====================
    CreateSignatureInput:
      type: object
      required:
        - documentId
        - documentType
        - documentContent
        - userId
        - userName
      properties:
        documentId:
          $ref: '#/components/schemas/UUID'
        documentType:
          type: string
        documentContent:
          type: string
        userId:
          $ref: '#/components/schemas/UUID'
        userName:
          type: string
        userRfc:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    SignatureResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            signature:
              type: object
              properties:
                id:
                  $ref: '#/components/schemas/UUID'
                documentId:
                  $ref: '#/components/schemas/UUID'
                documentType:
                  type: string
                userId:
                  $ref: '#/components/schemas/UUID'
                userName:
                  type: string
                signedAt:
                  $ref: '#/components/schemas/Timestamp'
                documentHash:
                  type: string
                signatureValue:
                  type: string
                algorithm:
                  type: string
            verificationHash:
              type: string

