      #root {

      /* Loading state for 3G networks */
      .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e5e7eb;
        border-top: 4px solid #10b981;
        border-radius: 50%;

      @keyframes spin {

        100% { transform: rotate(360deg); }
      }
      
      .loading-text {
        margin-top: 1rem;
        color: #6b7280;
        font-size: 0.875rem;
        text-align: center;
      }
      
      /* Hide scrollbar during loading */
      body.loading {

        --primary-600: #059669;
        --primary-700: #047857;

      /* Responsive design for Mexican mobile networks */
      @media (max-width: 640px) {

          height: 40px;

    <div id="loading" class="loading-container">

    <div id="root"></div>
    
    <!-- Deferred non-critical JavaScript -->
    <script>
      // Hide loading screen when React app loads
      window.addEventListener('DOMContentLoaded', function() {
        // Keep loading screen for at least 800ms for smooth UX
        setTimeout(function() {
          const loading = document.getElementById('loading');
          if (loading) {
            loading.style.opacity = '0';
            loading.style.transition = 'opacity 0.3s ease-out';
            setTimeout(() => loading.remove(), 300);
          }
          document.body.classList.remove('loading');
        }, 800);
      });

            })

      // Performance monitoring for Mexican networks
      if (window.performance && window.performance.mark) {
        window.performance.mark('doctormx-start');
        window.addEventListener('load', function() {
          window.performance.mark('doctormx-loaded');
          window.performance.measure('doctormx-load-time', 'doctormx-start', 'doctormx-loaded');
        });
      }
