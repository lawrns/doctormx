<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="150" cy="200" r="130" fill="#E9F5F4" />
  
  <!-- Doctor coat -->
  <path d="M110 280C110 280 120 340 150 340C180 340 190 280 190 280L200 180L100 180L110 280Z" fill="white" stroke="#26A69A" stroke-width="4"/>
  
  <!-- Stethoscope -->
  <path d="M130 240C130 240 140 260 150 260C160 260 170 240 170 240" stroke="#0284C7" stroke-width="3" stroke-linecap="round"/>
  <circle cx="130" cy="240" r="5" fill="#0284C7"/>
  
  <!-- Head -->
  <circle cx="150" cy="140" r="50" fill="#FFF8E1" stroke="#26A69A" stroke-width="4"/>
  
  <!-- Eyes -->
  <circle cx="130" cy="130" r="6" fill="#263238"/>
  <circle cx="170" cy="130" r="6" fill="#263238"/>
  
  <!-- Smile -->
  <path d="M130 160C130 160 140 170 150 170C160 170 170 160 170 160" stroke="#263238" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Hair -->
  <path d="M100 130C100 130 110 90 150 90C190 90 200 130 200 130" fill="#263238"/>
  
  <!-- Doctor's cap -->
  <path d="M110 100L150 80L190 100" stroke="#26A69A" stroke-width="4" stroke-linecap="round"/>
  <rect x="130" y="90" width="40" height="10" fill="#26A69A"/>
  
  <!-- Badge -->
  <rect x="160" y="200" width="20" height="30" rx="2" fill="#FFB300" stroke="#263238" stroke-width="1"/>
  <line x1="165" y1="205" x2="175" y2="205" stroke="#263238" stroke-width="1"/>
  <line x1="165" y1="210" x2="175" y2="210" stroke="#263238" stroke-width="1"/>
  <line x1="165" y1="215" x2="175" y2="215" stroke="#263238" stroke-width="1"/>
  
  <!-- Doctor name: Dr. Cóatl (Nahuatl for "serpent", referencing medical symbol) -->
  <text x="150" y="350" font-family="Poppins, sans-serif" font-size="14" text-anchor="middle" fill="#263238" font-weight="bold">Dr. Cóatl</text>
</svg>