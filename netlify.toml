[build]
  command = "npm install --legacy-peer-deps && ROLLUP_NATIVE_DISABLE=true npx vite build"
  publish = "dist"
  
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  SKIP_PREFLIGHT_CHECK = "true"
  DISABLE_ESLINT_PLUGIN = "false"
  CI = "false"
  NODE_ENV = "production"
  NODE_OPTIONS = "--max-old-space-size=4096"
  NODE_VERSION = "18.18.0"
