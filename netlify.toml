[build]
  command = "npm install --legacy-peer-deps && npm install vite@4.5.1 @vitejs/plugin-react@4.1.0 --no-save && node dependency-fixer.js && node fix-react-imports.js && VITE_SKIP_AUTOINJECTION=true npx vite build --log-level info"
  publish = "dist"
  functions = "netlify/functions"
  ignore_warnings = true

[build.environment]
  NODE_FETCH_TIMEOUT = "30000"
  NODE_ENV = "production"
  VITE_SUPABASE_URL = "https://oxlbametpfubwnrmrbsv.supabase.co"
  VITE_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94bGJhbWV0cGZ1Ynducm1yYnN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA2MjAxNjQsImV4cCI6MjA1NjE5NjE2NH0.H2_4ueekh5HVvdXBw7OX_EKWEO26kehXBRfd5HJvjgA"
  # Explicitly set the OpenAI API key for Netlify functions - use fallback key from functions if not provided
