[build]
  command = "npm install --no-package-lock && npm run build:netlify"
  publish = "build"
  
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  SKIP_PREFLIGHT_CHECK = "true"
  DISABLE_ESLINT_PLUGIN = "false"
  CI = "false"
  NODE_OPTIONS = "--max-old-space-size=4096"
