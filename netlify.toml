[build]
  command = "rm -rf node_modules && npm install --force && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.12.2"
  NODE_FETCH_TIMEOUT = "30000"
  NPM_FLAGS = "--legacy-peer-deps --force"
  # Build optimization variables
  FORCE_COLOR = "1"
  CI = "true"
  NETLIFY = "true"
  VITE_ENTRY = "/src/index.tsx"
  # Force production context
  CONTEXT = "production"
  # Sharp configuration for Netlify
  SHARP_IGNORE_GLOBAL_LIBVIPS = "1"
  npm_config_arch = "x64"
  npm_config_platform = "linux"
  npm_config_libc = "glibc"
  # Force npm to use x64 architecture
  npm_config_target_arch = "x64"
  npm_config_target_platform = "linux"
  npm_config_target_libc = "glibc"
  # Disable binary caching
  npm_config_cache = "/tmp/.npm"

# EXPLICIT: Production deploy context for main branch
[context.production]
  publish = "dist"
  command = "rm -rf node_modules package-lock.json && npm install --force && npm run build"
  
[context.production.environment]
  NODE_ENV = "production"
  CONTEXT = "production"

# Deploy preview context for pull requests
[context.deploy-preview]
  publish = "dist"
  command = "rm -rf node_modules package-lock.json && npm install --force && npm run build"

# Branch deploy context - should not be used for main
[context.branch-deploy]
  publish = "dist"
  command = "rm -rf node_modules package-lock.json && npm install --force && npm run build"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["openai"]

# Development configuration
[dev]
  command = "vite"
  port = 8888
  publish = "dist"
  functions = "netlify/functions"

# Specific API redirects for cleaner routing
[[redirects]]
  from = "/api/v1/standard-model"
  to = "/.netlify/functions/standard-model"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/premium-model"
  to = "/.netlify/functions/premium-model"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/image-analysis"
  to = "/.netlify/functions/image-analysis"
  status = 200
  force = true

# Fallback for other API routes
[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/:splat"
  status = 200

# CRITICAL: SPA redirect rule - MUST be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200