[build]
  command = "npm install --legacy-peer-deps && node dependency-fixer.js && node fix-react-imports.js && VITE_SKIP_AUTOINJECTION=true npm run build"
  publish = "dist"
  functions = "netlify/functions"
  ignore_warnings = true

[build.environment]
  NODE_FETCH_TIMEOUT = "30000"
  VITE_SUPABASE_URL = "https://oxlbametpfubwnrmrbsv.supabase.co"
  VITE_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94bGJhbWV0cGZ1Ynducm1yYnN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA2MjAxNjQsImV4cCI6MjA1NjE5NjE2NH0.H2_4ueekh5HVvdXBw7OX_EKWEO26kehXBRfd5HJvjgA"
  # Copy the OpenAI API key from VITE_OPENAI_API_KEY to OPENAI_API_KEY for Netlify functions
  OPENAI_API_KEY = "${VITE_OPENAI_API_KEY}"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["openai"]

# Specific API redirects for clearer routing
[[redirects]]
  from = "/api/v1/standard-model"
  to = "/.netlify/functions/standard-model"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/premium-model"
  to = "/.netlify/functions/premium-model"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/image-analysis"
  to = "/.netlify/functions/image-analysis"
  status = 200
  force = true

# Fallback for other API routes
[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200