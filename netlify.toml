[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Next.js requires the Next.js runtime plugin
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Extended function timeout for AI-heavy endpoints (SOAP multi-agent consultation)
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["openai"]

# AI endpoints need longer timeout (default 10s is too short for multi-provider fallback)
[functions."___netlify-server-handler"]
  timeout = 26
