<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#3b82f6">
  <title>Sin conexión - Doctor.mx</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: #333;
      background-color: #f9fafb;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #3b82f6;
      margin-bottom: 2rem;
      text-align: center;
    }
    .card {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      padding: 2rem;
      text-align: center;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-top: 0;
      margin-bottom: 1rem;
    }
    p {
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .button {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      border-radius: 0.375rem;
      transition: background-color 0.15s ease-in-out;
    }
    .button-primary {
      background-color: #3b82f6;
      color: white;
    }
    .button-secondary {
      background-color: #e5e7eb;
      color: #4b5563;
    }
    .button-primary:hover {
      background-color: #2563eb;
    }
    .button-secondary:hover {
      background-color: #d1d5db;
    }
    .cache-list {
      text-align: left;
      margin-bottom: 1.5rem;
    }
    .cache-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .cache-item:last-child {
      border-bottom: none;
    }
    .cache-item a {
      text-decoration: none;
      color: #3b82f6;
    }
    footer {
      text-align: center;
      padding: 1rem;
      color: #6b7280;
      font-size: 0.875rem;
    }
    @media (min-width: 640px) {
      .actions {
        flex-direction: row;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Doctor.mx</div>
    
    <div class="card">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto 1rem;">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
      
      <h1>Sin conexión a Internet</h1>
      <p>No se puede acceder a Doctor.mx en este momento porque no tienes conexión a Internet. Algunas funciones están disponibles offline.</p>
      
      <div class="cache-list" id="cachedPages">
        <!-- Cached pages will be dynamically inserted here by JavaScript if available -->
      </div>
      
      <div class="actions">
        <a href="/" class="button button-primary">Intentar nuevamente</a>
        <button id="checkConnBtn" class="button button-secondary">Comprobar conexión</button>
      </div>
    </div>
  </div>
  
  <footer>
    © Doctor.mx - Todos los derechos reservados
  </footer>

  <script>
    // Check connection status when the button is clicked
    document.getElementById('checkConnBtn').addEventListener('click', function() {
      if (navigator.onLine) {
        window.location.reload();
      } else {
        alert('Aún no tienes conexión a Internet. Por favor, conéctate e intenta nuevamente.');
      }
    });

    // Dynamically list available cached pages if possible
    if ('caches' in window) {
      caches.open('doctormx-v1')
        .then(cache => cache.keys())
        .then(requests => {
          const cachedPagesEl = document.getElementById('cachedPages');
          
          if (requests.length > 0) {
            const htmlPages = requests
              .filter(request => 
                request.url.endsWith('.html') || 
                request.url.endsWith('/') ||
                !request.url.includes('.')
              )
              .map(request => {
                let displayUrl = request.url;
                displayUrl = displayUrl.replace(/https?:\/\/[^/]+/, '');
                
                if (displayUrl === '/' || displayUrl === '/index.html') {
                  return { url: '/', title: 'Página de inicio' };
                }
                
                if (displayUrl === '/sintomas/' || displayUrl.includes('/sintomas')) {
                  return { url: '/sintomas/', title: 'Evaluación de síntomas' };
                }
                
                // Other specific page mappings can be added here
                
                return { url: displayUrl, title: `Página: ${displayUrl}` };
              });
              
            const uniquePages = Array.from(
              new Map(htmlPages.map(page => [page.url, page])).values()
            );
            
            if (uniquePages.length > 0) {
              cachedPagesEl.innerHTML = '<h3>Páginas disponibles sin conexión:</h3>';
              
              uniquePages.forEach(page => {
                const item = document.createElement('div');
                item.className = 'cache-item';
                
                const link = document.createElement('a');
                link.href = page.url;
                link.textContent = page.title;
                
                item.appendChild(link);
                cachedPagesEl.appendChild(item);
              });
            }
          }
        })
        .catch(error => {
          console.error('Error accessing cache:', error);
        });
    }

    // Listen for online status changes
    window.addEventListener('online', () => {
      document.querySelector('.card').innerHTML += '<p style="color: #10b981; font-weight: bold;">¡Conexión restaurada! Redirigiendo...</p>';
      setTimeout(() => {
        window.location.reload();
      }, 1000);
    });
  </script>
</body>
</html>
